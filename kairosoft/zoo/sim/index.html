<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動物園物語 佈局模擬器｜棲地相性相鄰即時判定</title>
    <meta name="description" content="動物園物語（Zoo Park Story）免費線上佈局模擬器：把同棲地動物擺在一起即時判定成立哪些棲地相性群，提示還差哪隻動物，規劃森林、沙漠、草原、叢林、水邊、極地的最佳分區佈局。">
    <meta name="keywords" content="動物園物語,佈局模擬器,棲地相性,相鄰,Zoo Park Story,棲地分區,開羅遊戲,Kairosoft">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://ploglin.github.io/kairosoft/zoo/sim/">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦁</text></svg>">
    <meta property="og:type" content="website">
    <meta property="og:title" content="動物園物語 佈局模擬器｜棲地相性相鄰即時判定">
    <meta property="og:description" content="把同棲地動物擺在一起即時判定棲地相性群、提示差一步的動物、規劃最佳分區佈局。">
    <meta property="og:locale" content="zh_TW">
    <meta property="og:url" content="https://ploglin.github.io/kairosoft/zoo/sim/">
    <meta name="twitter:card" content="summary">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/shell.css">
</head>
<body>
    <main class="container">
        <h1 style="font-size:clamp(22px,3.5vw,30px);font-weight:900;margin:14px 0 2px">動物園物語 佈局模擬器</h1>
        <p style="color:var(--ink-soft);margin:6px 0 14px">把<strong>同一棲地環境</strong>的動物擺在一起，即時判定成立哪些<strong>棲地相性群</strong>（同環境代表動物相鄰成組），集中照顧效率與相性加成，右側提示<strong>差一步就成立</strong>的組合。資料取自本站
            <a href="../db/combos/">棲地相性資料庫</a>；玩法見 <a href="../">動物園物語攻略</a>。<br>
            <small style="color:var(--muted)">※ 每組取該環境代表動物為判定成員；成立採「成員彼此相鄰」判定為規劃輔助，實際同環境動物越多、植栽越齊相性越高，以遊戲為準。</small></p>
        <div id="simApp"></div>
    </main>

    <script src="../db/data.js"></script>
    <script src="../../../assets/sim.js"></script>
    <script>
        SimEngine.mount({
            category: 'combos', nameCol: 0, reqCol: 1, reqSep: '・',
            bonuses: [{ i: 2, label: '相性效果', sum: false }],
            rule: { type: 'radius', dist: 1 }, ruleText: '同棲地動物彼此相鄰（1 格內）'
        });
    </script>
    <script src="../../../assets/shell.js"></script>
    <script>Shell.mount({ page: 'sim', game: { id: 'zoo', type: 'simulator' }, breadcrumb: [{ t: '動物園物語', href: '../' }, { t: '佈局模擬器' }] });</script>
</body>
</html>
