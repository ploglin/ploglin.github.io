        <h1 style="font-size:clamp(22px,3.5vw,30px);font-weight:900;margin:14px 0 2px">大江戶物語 佈局模擬器</h1>
        <p style="color:var(--ink-soft);margin:6px 0 14px">在格子上擺建築，即時判定成立哪些<strong>小巷 combo</strong>（成員彼此 3 格內），累計石高與商品價格加成，右側還會提示<strong>差一步就成立</strong>的小巷。資料取自本站

        SimEngine.mount({
            category: 'combos', nameCol: 0, reqCol: 4, reqSep: '・',
