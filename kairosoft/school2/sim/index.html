    <style>
        :root { --tile: 35px; --axis: 22px; }

        body {
            font-family: 'Noto Sans TC', 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #333;
            overflow: hidden; 
        }

        .map-container {
            position: relative;
            overflow: auto;
            border-radius: 8px;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            width: fit-content;
            max-width: 100%;
            max-height: calc(100vh - 80px);
            margin: 0 auto;
        }

        .game-grid {
            touch-action: none; /* 觸控畫圖時不捲動頁面 */
            display: grid;
            /* 24 columns + 2 axis columns (Left/Right) */
            grid-template-columns: var(--axis) repeat(24, var(--tile)) var(--axis);
            /* 26 rows + 2 axis rows (Top/Bottom) */
            grid-template-rows: var(--axis) repeat(26, var(--tile)) var(--axis);
            gap: 1px;
            background-color: #d1d5db;
            border: 2px solid #9ca3af;
            width: fit-content;
        }

        .axis-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--axis) * 0.45);
            color: #4b5563;
            font-family: 'Inter', monospace;
            background-color: #f3f4f6;
            font-weight: 800;
            user-select: none;
        }

        .tile {
            width: var(--tile);
            height: var(--tile);
            background-color: #bbf7d0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--tile) * 0.42);
            font-weight: bold;
            color: rgba(0,0,0,0.8);
            user-select: none;
            transition: transform 0.1s;
            position: relative;
            cursor: crosshair;
        }

        .tile:hover {
            opacity: 0.9;
            transform: scale(1.15);
            z-index: 30;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        .elevation-2 {
            border-top: 3px solid #b45309;
            border-left: 3px solid #d97706;
            filter: brightness(0.95);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.1);
        }

        .elevation-3 {
            border-top: 3px solid #7c2d12;
            border-left: 3px solid #9a3412;
            filter: brightness(0.88);
            box-shadow: inset -3px -3px 5px rgba(0,0,0,0.2);
        }

        /* 自動斜坡：高低差交界（高的那格）以斜紋標示 */
        .tile.slope-tile {
            background-image: repeating-linear-gradient(45deg, rgba(146, 64, 14, 0.35) 0 3px, transparent 3px 8px);
        }

        .palette-item {
            cursor: pointer;
            transition: all 0.2s;
        }
        .palette-item.active {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6 !important;
            border-width: 2px;
            background-color: #eff6ff;
        }

        /* 多格建築放置預覽：橘色實線框 */
        .tile.fp-preview {
            outline: 2px solid #f59e0b;
            outline-offset: -2px;
            z-index: 15;
        }
        .tile.fp-preview::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(245, 158, 11, 0.25);
            pointer-events: none;
            z-index: 4;
        }

        /* 菱形（等角）視角：整個網格旋轉 45°，文字反向轉回維持直立 */
        body.diamond .map-container {
            overflow: visible;
            max-height: none;
            background: transparent;
            box-shadow: none;
        }
        body.diamond .game-grid {
            position: absolute;
            top: 50%;
            left: 50%;
            /* 逆時針轉 45°（讓 [X2,Y2] 角朝上）再垂直壓一半 → 與遊戲相同的 2:1 等角地磚 */
            transform: translate(-50%, -50%) scaleY(0.5) rotate(-45deg);
        }
        body.diamond .axis-label,
        body.diamond .tile .content-span {
            /* 反向變形，讓文字保持直立且不變形 */
            transform: rotate(45deg) scaleY(2);
        }
        body.diamond .spot-tooltip {
            transform: translateX(-50%) rotate(45deg) scaleY(2);
        }

        /* 矩形工具預覽：靛藍框 */
        .tile.rect-preview {
            outline: 2px solid #6366f1;
            outline-offset: -2px;
        }
        .tile.rect-preview::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(99, 102, 241, 0.25);
            pointer-events: none;
            z-index: 4;
        }

        /* 無法進入的設施：紅框警告（四周被建築完全包圍） */
        .tile.blocked {
            outline: 2px solid #dc2626;
            outline-offset: -2px;
        }

        /* 次佳建議：天藍點狀框（放置後只差一項其他條件） */
        .tile.suggest2::after {
            content: '';
            position: absolute;
            inset: 1px;
            border: 2px dotted #0ea5e9;
            border-radius: 4px;
            background: rgba(14, 165, 233, 0.12);
            pointer-events: none;
            z-index: 5;
        }

        /* 建議放置位置：藍色虛線框 */
        .tile.suggest::after {
            content: '';
            position: absolute;
            inset: 1px;
            border: 2px dashed #2563eb;
            border-radius: 4px;
            background: rgba(59, 130, 246, 0.18);
            pointer-events: none;
            z-index: 5;
            animation: suggestPulse 1.2s ease-in-out infinite;
        }
        @keyframes suggestPulse {
            0%, 100% { opacity: 0.45; }
            50% { opacity: 1; }
        }

        .spot-tooltip {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.98);
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            z-index: 50;
            width: max-content;
            max-width: 220px;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.15s;
        }
        .tile:hover .spot-tooltip {
            opacity: 1;
            visibility: visible;
        }
        .spot-tooltip::after {
            content: '';
            position: absolute;
            top: 100%; left: 50%; margin-left: -6px;
            border-width: 6px; border-style: solid;
            border-color: rgba(255, 255, 255, 0.98) transparent transparent transparent;
        }

        /* 窄螢幕（手機/直式平板）：地圖在上、建築面板在下 */
        @media (max-width: 768px) {
            #appBody { flex-direction: column; }
            #appBody aside {
                width: 100%;
                max-height: 42vh;
                border-left: none;
                border-top: 1px solid #e5e7eb;
            }
            #toolHint { display: none; }
            #coordHint { bottom: calc(42vh + 0.5rem); }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>

            { id: 'aozora', name: '青空', req: ['giraffe', 'statue_br', 'totem'], bonus: '文系+3 頭腦+2 人氣+2', dotColor: 'bg-sky-400' },
            { id: 'africa', name: '非洲', req: ['giraffe', 'elephant', 'totem'], bonus: '文系+5 理系+3 態度+2', dotColor: 'bg-yellow-600' },
            { id: 'cosmo', name: '宇宙', req: ['rocket', 'planetarium', 'av_room'], bonus: '理系+3 頭腦+2 人氣+2', dotColor: 'bg-indigo-600' },
            { id: 'kairo', name: '開羅', req: ['kairo_gold', 'kairo_statue', 'kairo_room'], bonus: '文系+5 理系+5 人氣+3 態度+3', dotColor: 'bg-amber-500' }
        ];

        let currentTool = 'grass';
        let currentElevation = 1;
        let isDrawing = false;
        // 觸控狀態：單點=畫一格、拖曳=連續畫、長按不動=吸管
        let touchState = null;

        // Grid Dimensions
        const gridRows = 26; // X: 2 to 27

        // ─── 復原／重做 ───
        const HISTORY_MAX = 60;

        function pushHistory() {
            undoStack.push(JSON.stringify(gridData));
            if (undoStack.length > HISTORY_MAX) undoStack.shift();
            redoStack.length = 0;
            updateHistoryButtons();
        }

        function restoreSnapshot(json) {
            gridData = JSON.parse(json);
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) updateTileVisuals(r, c);
            }

        function undo() {
            if (!undoStack.length) { showSysMsg('沒有可復原的步驟', true); return; }

            updateHistoryButtons();
        }

        function redo() {
            if (!redoStack.length) { showSysMsg('沒有可重做的步驟', true); return; }

        function updateHistoryButtons() {

        // ─── 偏好記憶與自動儲存 ───
        const PREFS_KEY = 'pa2_prefs_v1', AUTOSAVE_KEY = 'pa2_autosave_v1';
        let prefs = {};
        try { prefs = JSON.parse(localStorage.getItem(PREFS_KEY)) || {}; } catch (e) { prefs = {}; }
        function savePrefs(patch) {
            Object.assign(prefs, patch);
            try { localStorage.setItem(PREFS_KEY, JSON.stringify(prefs)); } catch (e) {}

        // 體檢報告用的最近一次計算結果
        let lastSpotStats = { activeIds: new Set(), nearMap: new Map() };
        let lastBlockedCount = 0;

        // ─── 矩形填滿工具 ───
        let rectMode = false, rectStart = null, rectEnd = null;

        function previewRect() {
            document.querySelectorAll('.tile.rect-preview').forEach(t => t.classList.remove('rect-preview'));
            if (!rectStart || !rectEnd) return;
            const r1 = Math.min(rectStart.r, rectEnd.r), r2 = Math.max(rectStart.r, rectEnd.r);
            const c1 = Math.min(rectStart.c, rectEnd.c), c2 = Math.max(rectStart.c, rectEnd.c);
            for (let r = r1; r <= r2; r++) {
                for (let c = c1; c <= c2; c++) {
                    const el = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
                    if (el) el.classList.add('rect-preview');
                }
            }
        }

        function commitRect() {
            const r1 = Math.min(rectStart.r, rectEnd.r), r2 = Math.max(rectStart.r, rectEnd.r);
            const c1 = Math.min(rectStart.c, rectEnd.c), c2 = Math.max(rectStart.c, rectEnd.c);
            for (let r = r1; r <= r2; r++) {
                for (let c = c1; c <= c2; c++) {
                    gridData[r][c] = { type: currentTool, elevation: currentElevation };
                }
            }
            // 連同外圍一圈重繪（鄰接建築的合併縫隙會受影響）
            for (let r = Math.max(0, r1 - 1); r <= Math.min(gridRows - 1, r2 + 1); r++) {
                for (let c = Math.max(0, c1 - 1); c <= Math.min(gridCols - 1, c2 + 1); c++) {
                    updateTileVisuals(r, c);
                }
            }
            rectStart = rectEnd = null;
            document.querySelectorAll('.tile.rect-preview').forEach(t => t.classList.remove('rect-preview'));
            checkSpots();
        }

        // ─── 分享連結：把地圖 RLE 壓縮成 base64url 放進網址 hash ───
        // 注意：TYPE_KEYS 依 items 定義順序，新增設施務必 append 在該分類尾端，避免舊連結失效
        const TYPE_KEYS = Object.keys(items);

        function encodeMap() {
            const parts = [];
            let prev = null, count = 0;
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const cell = gridData[r][c];
                    const key = TYPE_KEYS.indexOf(cell.type) + '.' + (cell.elevation || 1);
                    if (key === prev) { count++; }
                    else {
                        if (prev !== null) parts.push(prev + '.' + count);
                        prev = key; count = 1;
                    }
                }
            }
            if (prev !== null) parts.push(prev + '.' + count);
            return btoa(parts.join(',')).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        function decodeMap(code) {
            try {
                const str = atob(code.replace(/-/g, '+').replace(/_/g, '/'));
                const cells = [];
                for (const p of str.split(',')) {
                    const [t, e, n] = p.split('.').map(Number);
                    for (let k = 0; k < n; k++) cells.push({ type: TYPE_KEYS[t] || 'empty', elevation: e || 1 });
                }
                if (cells.length !== gridRows * gridCols) return null;
                const grid = [];
                for (let r = 0; r < gridRows; r++) grid.push(cells.slice(r * gridCols, (r + 1) * gridCols));
                return grid;
            } catch (err) { return null; }
        }

        function styleSuggestBtn() {
            const b = document.getElementById('suggestBtn');
            if (!b) return;
            const on = !prefs.suggestOff;
            b.classList.toggle('bg-indigo-600', on);
            b.classList.toggle('text-white', on);
        }

        let autosaveTimer;
        function scheduleAutosave() {
            clearTimeout(autosaveTimer);
            autosaveTimer = setTimeout(() => {
                try { localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(gridData)); } catch (e) {}
            }, 400);
        }

        // 依視窗大小縮放格子，讓整張地圖盡量一屏放下、不出現捲軸
        function fitGrid() {
            const main = document.querySelector('main');
            if (!main) return;
            const axis = 22, gap = 1;
            const availW = main.clientWidth - 34;
            const availH = main.clientHeight - 34;
            const diamond = document.body.classList.contains('diamond');
            let tile;
            if (diamond) {
                // 2:1 等角：外框寬 = (原寬+原高)×sin45°，高再壓一半
                const fixed = 4 * axis + gap * (25 + 27) + 8;
                const totalW = availW / 0.7071;
                const totalH = availH / 0.3536;
                tile = Math.floor((Math.min(totalW, totalH) - fixed) / (gridCols + gridRows));
            } else {
                const tileW = (availW - axis * 2 - gap * 25 - 4) / gridCols;
                const tileH = (availH - axis * 2 - gap * 27 - 4) / gridRows;
                tile = Math.floor(Math.min(tileW, tileH));
            }
            tile = Math.max(10, Math.min(40, tile));
            document.documentElement.style.setProperty('--tile', tile + 'px');
            document.documentElement.style.setProperty('--axis', axis + 'px');

            // 菱形模式：容器要撐出旋轉後的正方形外框，讓網格置中
            const container = document.getElementById('mapContainer');
            if (container) {
                if (diamond) {
                    const w = axis * 2 + gridCols * tile + gap * 25 + 4;
                    const h = axis * 2 + gridRows * tile + gap * 27 + 4;
                    const side = Math.ceil((w + h) * 0.7071);
                    container.style.width = side + 'px';
                    container.style.height = Math.ceil(side / 2) + 'px';
                } else {
                    container.style.width = '';
                    container.style.height = '';
                }
            }
        }
        window.addEventListener('resize', fitGrid);

        function updateCoordHint(r, c) {
            const cell = gridData[r][c];
            const item = items[cell.type] || items['empty'];
            const label = item.id === 'empty' ? (isSlope(r, c) ? '斜坡（自動）' : '空地') : item.name;
            const tileEl = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
            const warn = tileEl && tileEl.classList.contains('blocked') ? '　⚠ 被包圍，學生無法進入' : '';
            const elevName = cell.elevation === 3 ? '高地2層' : cell.elevation === 2 ? '高地1層' : '平地';
            document.getElementById('coordHint').innerText = `X:${r + 2}　Y:${25 - c}　${label}（${elevName}）${warn}`;
        }

        // 多格建築的放置預覽：標示滑鼠所在位置放下去會占據的範圍
        function previewFootprint(r, c) {
            document.querySelectorAll('.tile.fp-preview').forEach(t => t.classList.remove('fp-preview'));
            const fp = getFootprint(currentTool);
            if (fp.w === 1 && fp.h === 1) return;
            for (let dr = 0; dr < fp.h; dr++) {
                for (let dc = 0; dc < fp.w; dc++) {
                    const el = document.querySelector(`.tile[data-r="${r + dr}"][data-c="${c + dc}"]`);
                    if (el) el.classList.add('fp-preview');
                }
            }
        }

        // 依目前選取的建築，找出「放下去就能完成人氣景點」的空格並標示藍色虛線框。
        // 判定（官方 4×4 規則）：某個 4×4 視窗已集齊該景點除了選取建築外的所有條件時，
        // 只要建築佔地與該視窗有交集、且佔地全為空格，就是有效的建議位置（標示於左上角錨點格）。
        function updateSuggestions() {
            document.querySelectorAll('.tile.suggest, .tile.suggest2').forEach(t => t.classList.remove('suggest', 'suggest2'));
            const toolId = currentTool;
            if (prefs.suggestOff) return null;
            if (!toolId || toolId === 'empty') return null;
            const inGroup = g => (Array.isArray(g) ? g.includes(toolId) : g === toolId);
            // 已成立的景點不再提示（隨成立數增加，畫面才不會越來越吵）
            const relevantSpots = SPOTS.filter(s => s.req.some(inGroup) && !lastSpotStats.activeIds.has(s.id));
            if (!relevantSpots.length) return null;
            const fp = getFootprint(toolId);

            const suggest = Array(gridRows).fill(null).map(() => Array(gridCols).fill(false));
            const suggest2 = Array(gridRows).fill(null).map(() => Array(gridCols).fill(false));
            const hitSpots = new Set();
            const near = new Map(); // 放置後只差一項條件的景點 → 還缺的設施名

            for (let wr = 0; wr <= gridRows - 4; wr++) {
                for (let wc = 0; wc <= gridCols - 4; wc++) {
                    const typesIn = new Set();
                    for (let dr = 0; dr < 4; dr++) {
                        for (let dc = 0; dc < 4; dc++) {
                            const t = gridData[wr + dr][wc + dc].type;
                            if (t !== 'empty') typesIn.add(t);
                            else if (isSlope(wr + dr, wc + dc)) typesIn.add('slope');
                        }
                    }
                    relevantSpots.forEach(spot => {
                        const myGroup = spot.req.find(inGroup);
                        const others = spot.req.filter(g => g !== myGroup);
                        if (!others.length) return;
                        if ((Array.isArray(myGroup) ? myGroup : [myGroup]).some(t => typesIn.has(t))) return; // 該條件已存在
                        const unmet = others.filter(g => !(Array.isArray(g) ? g : [g]).some(t => typesIn.has(t)));
                        let target;
                        if (unmet.length === 0) {
                            hitSpots.add(spot.name);
                            target = suggest;
                        } else if (unmet.length === 1 && others.length > 1) {
                            // 次佳：這一帶已有一項其他條件，放置後只差一項
                            const missName = (Array.isArray(unmet[0]) ? unmet[0] : [unmet[0]])
                                .map(t => items[t] ? items[t].name : t).join('/');
                            near.set(spot.name, missName);
                            target = suggest2;
                        } else return;
                        // 錨點只要讓建築佔地與此 4×4 視窗有交集即可
                        for (let ar = wr - fp.h + 1; ar < wr + 4; ar++) {
                            for (let ac = wc - fp.w + 1; ac < wc + 4; ac++) {
                                if (ar >= 0 && ac >= 0 && canPlaceAllEmpty(ar, ac, fp.w, fp.h)) {
                                    target[ar][ac] = true;
                                }
                            }
                        }
                    });
                }
            }

            let count = 0, count2 = 0;
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    if (suggest[r][c]) {
                        const el = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
                        if (el) { el.classList.add('suggest'); count++; }
                    }
                }
            }
            if (count === 0) { // 沒有可立即完成的位置時，才顯示次佳區域
                for (let r = 0; r < gridRows; r++) {
                    for (let c = 0; c < gridCols; c++) {
                        if (suggest2[r][c]) {
                            const el = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
                            if (el) { el.classList.add('suggest2'); count2++; }
                        }
                    }
                }
            }
            return { count, count2, hitSpots, near };
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderPalette();
            renderRecent();
            renderGrid();
            renderPresetOptions();
            setupEventListeners();
            seedProgressSave();
            loadSavedMapsList();

            // 還原上次的操作偏好

                document.body.classList.add('diamond');
                const btn = document.getElementById('diamondBtn');
                btn.classList.add('bg-indigo-600', 'text-white');
            }
            if (prefs.elevation >= 2) setElevation(prefs.elevation);
            styleSuggestBtn();
            styleFlowBtn();
            if (prefs.statsOpen) {
                document.getElementById('spotStatsBody').classList.remove('hidden');
                document.getElementById('spotStatsArrow').innerText = '▾';
            }
            selectTool(prefs.tool && items[prefs.tool] && !items[prefs.tool].hidden ? prefs.tool : 'grass');
            fitGrid();

            // 載入優先序：分享連結 → 自動儲存 → 預設圖
            let restored = false;
            const shareMatch = location.hash.match(/^#m=(.+)$/);
            if (shareMatch) {
                const shared = decodeMap(shareMatch[1]);
                if (shared) {
                    restored = importGridData(shared);
                    if (restored) showSysMsg('已載入分享的地圖');
                }
            }
            if (!restored) {
                try {
                    const auto = JSON.parse(localStorage.getItem(AUTOSAVE_KEY));
                    if (Array.isArray(auto)) {
                        restored = importGridData(auto);
                        if (restored) {
                            if (prefs.lastSave) {
                                document.getElementById('saveName').value = prefs.lastSave;
                                document.getElementById('loadLocalSelect').value = prefs.lastSave;
                            }
                            showSysMsg('已還原上次的編輯進度');
                        }
                    }
                } catch (e) {}
            }
            if (!restored) loadPreset('health');
        });

        function showSysMsg(text, isError = false) {
            const toast = document.getElementById('sysMsgToast');
            const icon = document.getElementById('sysMsgIcon');
            const msg = document.getElementById('sysMsgText');
            clearTimeout(toastTimeout);
            icon.innerText = isError ? '❌' : '✅';
            msg.innerText = text;
            toast.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-5 py-2 rounded-full shadow-lg text-xs font-bold z-50 transition-all duration-300 pointer-events-none flex items-center gap-2 ${isError ? 'bg-red-500 text-white' : 'bg-gray-800 text-white'}`;
            void toast.offsetWidth;
            toast.classList.remove('-translate-y-20', 'opacity-0');
            toastTimeout = setTimeout(() => { toast.classList.add('-translate-y-20', 'opacity-0'); }, 2500);
        }

        // GA4 事件埋點：只記錄有意義的離散動作（不追蹤逐格塗畫）
        let lastToolTracked = '';
        function track(name, params) {
            try { if (window.gtag) gtag('event', name, params || {}); } catch (e) {}
        }

        function setElevation(lvl) {
            currentElevation = lvl;
            savePrefs({ elevation: lvl });
            const activeCls = { 1: 'bg-white text-gray-800 shadow-sm', 2: 'bg-amber-600 text-white shadow-sm', 3: 'bg-orange-900 text-white shadow-sm' };
            [1, 2, 3].forEach(l => {
                const b = document.getElementById(`layer${l}Btn`);

            });

        function renderPalette() {
            const containers = {
                'tool': document.getElementById('palette-tools'),
                'env': document.getElementById('palette-env'),
                'fac': document.getElementById('palette-fac'),
                'spec': document.getElementById('palette-spec'),
                'sports': document.getElementById('palette-sports'),

            };

            Object.values(items).forEach(item => {

                const el = document.createElement('div');
                el.className = `palette-item flex flex-col items-center justify-center p-1.5 rounded border border-transparent bg-white shadow-sm`;
                el.id = `tool-${item.id}`;
                el.onclick = () => selectTool(item.id);
                const fpW = item.w || 1, fpH = item.h || 1;

                colorBox.style.backgroundColor = item.color;
                colorBox.style.color = item.textCol || 'black';
                colorBox.innerText = ITEM_ICONS[item.id] || item.short;
                if (item.id === 'empty') colorBox.classList.add('border', 'border-gray-300');

                const nameLabel = document.createElement('span');
                nameLabel.className = 'text-[9px] text-center leading-tight font-bold text-gray-500 whitespace-nowrap overflow-hidden w-full';
                nameLabel.innerText = item.name;

                el.appendChild(colorBox);
                el.appendChild(nameLabel);
                containers[item.type].appendChild(el);
            });
        }

        function createAxisLabel(text) {
            const div = document.createElement('div');
            div.className = 'axis-label';
            div.innerText = text;
            return div;
        }

        function renderGrid() {
            const gridEl = document.getElementById('gameGrid');
            gridEl.innerHTML = '';
            
            // --- TOP AXIS ROW (Y: 25 down to 2) ---
            gridEl.appendChild(createAxisLabel('')); // Top-left corner
            for (let c = 0; c < gridCols; c++) {
                gridEl.appendChild(createAxisLabel(25 - c));
            }
            gridEl.appendChild(createAxisLabel('')); // Top-right corner

            // --- MAIN GRID ROWS (X: 2 up to 27) ---
            for (let r = 0; r < gridRows; r++) {
                const currentX = r + 2;
                
                // Left Y-Axis (X index)
                gridEl.appendChild(createAxisLabel(currentX));

                // Map Tiles
                for (let c = 0; c < gridCols; c++) {
                    const currentY = 25 - c;

                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.dataset.r = r;
                    tile.dataset.c = c;
                    tile.title = `[X:${currentX}, Y:${currentY}]`;

                    const contentSpan = document.createElement('span');
                    contentSpan.className = 'content-span relative z-10 pointer-events-none drop-shadow-sm';
                    tile.appendChild(contentSpan);
                    
                    tile.addEventListener('mousedown', (e) => {
                        if (e.button === 2) return; // 右鍵留給吸管
                        e.preventDefault();
                        pushHistory(); // 一次筆劃（含拖曳）記錄一步
                        const fp = getFootprint(currentTool);
                        if ((rectMode || e.shiftKey) && fp.w === 1 && fp.h === 1) {
                            rectStart = { r, c }; rectEnd = { r, c };
                            previewRect();
                            return;
                        }
                        isDrawing = (fp.w === 1 && fp.h === 1); // 多格建築不支援拖曳連放
                        applyTool(r, c);
                    });
                    tile.addEventListener('contextmenu', (e) => {
                        e.preventDefault(); // 右鍵吸管：選取此格的類型
                        const t = gridData[r][c].type;
                        selectTool(t);
                        showSysMsg(t === 'empty' ? '吸管：已切換為清除模式' : `吸管：已選取「${items[t].name}」`);
                    });
                    tile.addEventListener('mouseenter', () => {
                        updateCoordHint(r, c);
                        if (rectStart) { rectEnd = { r, c }; previewRect(); return; }
                        previewFootprint(r, c);
                        if (isDrawing) applyTool(r, c);
                    });
                    tile.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        touchState = { r, c, lastR: r, lastC: c, painted: false, longFired: false };
                        updateCoordHint(r, c);
                        clearTimeout(longPressTimer);
                        longPressTimer = setTimeout(() => {
                            if (touchState && !touchState.painted) {
                                touchState.longFired = true; // 長按 = 吸管
                                const t = gridData[r][c].type;
                                selectTool(t);
                                showSysMsg(t === 'empty' ? '吸管：已切換為清除模式' : `吸管：已選取「${items[t].name}」`);
                            }
                        }, 500);
                    }, { passive: false });
                    
                    gridEl.appendChild(tile);
                }

                // Right Y-Axis
                gridEl.appendChild(createAxisLabel(currentX));
            }

            // --- BOTTOM AXIS ROW ---
            gridEl.appendChild(createAxisLabel('')); // Bottom-left corner
            for (let c = 0; c < gridCols; c++) {
                gridEl.appendChild(createAxisLabel(25 - c));
            }
            gridEl.appendChild(createAxisLabel('')); // Bottom-right corner

            document.addEventListener('mouseup', () => {
                if (rectStart && rectEnd) commitRect();
                isDrawing = false;
            });
            document.getElementById('gameGrid').addEventListener('contextmenu', e => e.preventDefault());

            // 觸控：移動中依手指位置找格子（touchmove 不會觸發各格的 mouseenter）
            gridEl.addEventListener('touchmove', (e) => {
                if (!touchState || touchState.longFired) return;
                e.preventDefault();
                const touch = e.touches[0];
                const hit = document.elementFromPoint(touch.clientX, touch.clientY);
                const tileEl = hit && hit.closest ? hit.closest('.tile') : null;
                if (!tileEl) return;
                const nr = +tileEl.dataset.r, nc = +tileEl.dataset.c;
                if (nr === touchState.lastR && nc === touchState.lastC && touchState.painted) return;
                const fp = getFootprint(currentTool);
                if (!touchState.painted) {
                    // 開始移動才上色（保留長按吸管的判定時間）
                    clearTimeout(longPressTimer);
                    pushHistory();
                    touchState.painted = true;
                    if (rectMode && fp.w === 1 && fp.h === 1) {
                        rectStart = { r: touchState.r, c: touchState.c };
                        rectEnd = { r: nr, c: nc };
                        previewRect();
                        touchState.lastR = nr; touchState.lastC = nc;
                        return;
                    }
                    isDrawing = (fp.w === 1 && fp.h === 1);
                    applyTool(touchState.r, touchState.c);
                }
                if (rectStart) { rectEnd = { r: nr, c: nc }; previewRect(); }
                else if (isDrawing) applyTool(nr, nc);
                updateCoordHint(nr, nc);
                touchState.lastR = nr; touchState.lastC = nc;
            }, { passive: false });

            gridEl.addEventListener('touchend', () => {
                clearTimeout(longPressTimer);
                if (!touchState) return;
                if (!touchState.painted && !touchState.longFired) {
                    // 單點 = 畫一格／放一棟
                    pushHistory();
                    applyTool(touchState.r, touchState.c);
                }
                if (rectStart && rectEnd) commitRect();
                isDrawing = false;
                touchState = null;
            });
            document.getElementById('mapContainer').addEventListener('mouseleave', () => {
                isDrawing = false;
                document.querySelectorAll('.tile.fp-preview').forEach(t => t.classList.remove('fp-preview'));
            });
        }

        function selectTool(id) {
            document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('active'));
            const selected = document.getElementById(`tool-${id}`);
            if (selected) selected.classList.add('active');
            currentTool = id;
            savePrefs({ tool: id });
            if (id !== lastToolTracked) { lastToolTracked = id; track('select_tool', { tool_id: id, category: (items[id] && items[id].type) || '' }); }
            if (id !== 'empty' && items[id] && !items[id].hidden) {
                const rec = (prefs.recent || []).filter(x => x !== id);
                rec.unshift(id);
                savePrefs({ recent: rec.slice(0, 8) });
                renderRecent();
            }
            // 狀態一律顯示在右下資訊卡，不再每次選取都跳提示訊息
            updateToolHint(id, updateSuggestions());
        }

        // 右下角資訊卡：選取的建築能組成哪些景點、目前地圖上的狀態
        function updateToolHint(id, res) {
            const el = document.getElementById('toolHint');
            const item = items[id];
            if (!item || id === 'empty') { el.classList.add('hidden'); return; }
            const inGroup = g => (Array.isArray(g) ? g.includes(id) : g === id);
            const related = SPOTS.filter(s => s.req.some(inGroup));
            const fp = getFootprint(id);
            const sizeTxt = fp.w * fp.h > 1 ? `（占地 ${fp.w}×${fp.h}）` : '';
            let html = `<div class="font-black text-gray-800 mb-1">${item.name}${sizeTxt}</div>`;
            if (!related.length) {
                html += '<div class="text-gray-500">不參與任何人氣景點</div>';
            } else {
                html += related.map(s => {
                    const others = s.req.filter(g => !inGroup(g))
                        .map(g => (Array.isArray(g) ? g : [g]).map(x => items[x] ? items[x].name : x).join('/')).join('＋');
                    let status = '';
                    if (lastSpotStats.activeIds.has(s.id)) {
                        status = ' <span class="text-green-600 font-bold">✔ 已成立</span>';
                    } else if (res && res.hitSpots && res.hitSpots.has(s.name)) {
                        status = ' <span class="text-blue-600 font-bold">✔ 藍框可立即完成</span>';
                    } else if (res && res.count === 0 && res.near && res.near.has(s.name)) {
                        status = ` <span class="text-sky-600 font-bold">△ 放天藍框處，再補「${res.near.get(s.name)}」</span>`;
                    }
                    return `<div class="text-gray-600"><b class="text-gray-800">${s.name}</b>：搭配 ${others}${status}</div>`;
                }).join('');
            }
            if (isBuildingType(id)) {
                html += '<div class="text-gray-400 mt-1 border-t border-gray-100 pt-1">攻略要訣：設施緊貼集中、少留通道，學生接觸多、戀愛事件較易觸發；但至少一側要鄰接空地或走廊，被完全包圍會無法使用（紅框警告）。</div>';
            }
            el.innerHTML = html;
            el.classList.remove('hidden');
        }

        // 自動斜坡（遊戲規則）：高低差相差一層的整條交界都是斜坡，斜坡位於「高的那格」，
        // 不能手動放置或移動。空地才會顯示為斜坡；相差兩層（平地貼高地2）則是懸崖、無斜坡。
        function isSlopeIn(g, r, c) {
            const cell = g[r][c];
            if (cell.type !== 'empty' || cell.elevation < 2) return false;
            return [[1, 0], [-1, 0], [0, 1], [0, -1]].some(([dr, dc]) => {
                const nr = r + dr, nc = c + dc;
                return nr >= 0 && nr < gridRows && nc >= 0 && nc < gridCols &&
                    g[nr][nc].elevation === cell.elevation - 1;
            });
        }
        function isSlope(r, c) { return isSlopeIn(gridData, r, c); }

        // 同一棟建築判定：同類型且同棟別編號（bid）。手繪的 1×1 地形沒有 bid、不合併。
        function sameBlockIn(g, r, c, nr, nc) {
            if (nr < 0 || nr >= gridRows || nc < 0 || nc >= gridCols) return false;
            const a = g[r][c], b = g[nr][nc];
            return a.type === b.type && a.bid !== undefined && a.bid === b.bid;
        }
        function sameBlock(r, c, nr, nc) { return sameBlockIn(gridData, r, c, nr, nc); }

        function updateTileVisuals(r, c) {
            const tileEl = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
            if (!tileEl) return;
            const tileData = gridData[r][c];
            const toolId = tileData.type;
            const item = items[toolId] || items['empty'];
            const contentSpan = tileEl.querySelector('.content-span');

            tileEl.classList.toggle('elevation-2', tileData.elevation === 2);
            tileEl.classList.toggle('elevation-3', tileData.elevation === 3);
            tileEl.classList.toggle('slope-tile', isSlope(r, c));

            if (toolId === 'empty') {
                tileEl.style.backgroundColor = '';
                tileEl.style.boxShadow = '';
                if(contentSpan) contentSpan.innerText = '';
            } else {
                tileEl.style.backgroundColor = item.color;
                // 同一棟建築的相鄰格：用同色陰影填滿格線縫隙，視覺上合併成一整塊
                const shadows = [];
                if (sameBlock(r, c, r, c + 1)) shadows.push(`1px 0 0 ${item.color}`);
                if (sameBlock(r, c, r, c - 1)) shadows.push(`-1px 0 0 ${item.color}`);
                if (sameBlock(r, c, r + 1, c)) shadows.push(`0 1px 0 ${item.color}`);
                if (sameBlock(r, c, r - 1, c)) shadows.push(`0 -1px 0 ${item.color}`);
                if (tileData.elevation === 2) shadows.push('inset -2px -2px 4px rgba(0,0,0,0.1)');
                if (tileData.elevation === 3) shadows.push('inset -3px -3px 5px rgba(0,0,0,0.2)');
                tileEl.style.boxShadow = shadows.join(', ');
                if(contentSpan) {
                    contentSpan.style.color = item.textCol || 'black';
                    // 標籤只顯示在整棟的左上角格
                    const corner = !(sameBlock(r, c, r - 1, c) || sameBlock(r, c, r, c - 1));
                    contentSpan.innerText = corner ? item.short : '';
                }
            }
        }

        function updateSpotIndicators(r, c, coreSet, areaSet) {
            const tileEl = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
            if (!tileEl) return;

            tileEl.querySelectorAll('.spot-indicators, .spot-tooltip, .spot-area-ov').forEach(n => n.remove());
            tileEl.classList.remove('ring-2', 'ring-yellow-400', 'ring-inset', 'z-10');

            // 影響範圍：只上淡黃底色，不加框（降低視覺噪音）
            if (areaSet.size > 0 && coreSet.size === 0) {
                const ov = document.createElement('div');
                ov.className = 'spot-area-ov absolute inset-0 bg-yellow-300/30 pointer-events-none z-[3]';
                tileEl.appendChild(ov);
            }

            // 核心格（條件建築本身）：黃框＋圓點＋懸浮說明
            const spotSet = coreSet;
            if (spotSet.size > 0) {
                tileEl.classList.add('ring-2', 'ring-yellow-400', 'ring-inset', 'z-10');

                const indContainer = document.createElement('div');
                indContainer.className = 'spot-indicators absolute -top-1 -right-1 flex flex-wrap-reverse gap-0.5 justify-end w-[120%] pointer-events-none z-20';

                const tooltip = document.createElement('div');
                tooltip.className = 'spot-tooltip flex flex-col gap-1.5 text-left';
                
                spotSet.forEach(spotId => {
                    const spot = SPOTS.find(s => s.id === spotId);
                    const dot = document.createElement('div');
                    dot.className = `w-2 h-2 rounded-full border border-white shadow-sm ${spot.dotColor}`;
                    indContainer.appendChild(dot);

                    // Map requirement building names for display（OR 條件顯示為「甲/乙」）
                    const reqNames = spot.req.map(g => (Array.isArray(g) ? g : [g])
                        .map(id => items[id] ? items[id].name : id).join('/')).join(' + ');

                    const tooltipItem = document.createElement('div');
                    tooltipItem.className = 'flex flex-col border-b border-gray-100 last:border-0 pb-1 last:pb-0';
                    tooltipItem.innerHTML = `
                        <div class="flex justify-between items-center gap-2">
                            <span class="text-[10px] font-black flex items-center gap-1 text-gray-800">
                                <div class="w-1.5 h-1.5 rounded-full ${spot.dotColor}"></div>
                                ${spot.name}<span class="text-gray-400 font-normal">（${SPOT_JP[spot.id] || ''}）</span>
                            </span>
                            <span class="bg-yellow-100 text-yellow-800 px-1 py-0.5 rounded text-[8px] font-bold">${spot.bonus}</span>
                        </div>
                        <span class="text-[9px] text-gray-500 mt-0.5">條件：${reqNames}</span>
                        ${spot.teacher ? `<span class="text-[9px] text-purple-500 mt-0.5">招募教師：${spot.teacher}</span>` : ''}
                    `;
                    tooltip.appendChild(tooltipItem);
                });
                
                tileEl.appendChild(indContainer);
                tileEl.appendChild(tooltip);
            }
        }

        // 可通行地形（供「設施是否被包圍」判定用）：空地、草地、走廊、道路、水泥地、斜面
        const PASSABLE = new Set(['empty', 'grass', 'wood_path', 'asphalt', 'concrete', 'slope']);
        function isBuildingType(t) {
            const it = items[t];
            return !!it && (it.type === 'fac' || it.type === 'spec' || it.type === 'sports' || it.type === 'farm');
        }

        // ─── 動線可達性：從校門 BFS ───
        // 跨格規則：同高度可走；高低差 1 且「高的那格」是斜坡可走；懸崖（差 2 層或無斜坡）不可走。
        function canStep(g, r, c, nr, nc) {
            const a = g[r][c], b = g[nr][nc];
            if (a.elevation === b.elevation) return true;
            if (Math.abs(a.elevation - b.elevation) !== 1) return false;
            const hi = a.elevation > b.elevation ? [r, c] : [nr, nc];
            return isSlopeIn(g, hi[0], hi[1]);
        }

        // 回傳步行距離矩陣（-1 = 不可達或非通行地形）；地圖上沒有校門時回傳 null
        function computeReachability() {
            const dist = Array(gridRows).fill(null).map(() => Array(gridCols).fill(-1));
            const queue = [];
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const t = gridData[r][c].type;
                    if (t === 'gate' || t === 'gate_h') { dist[r][c] = 0; queue.push([r, c]); }
                }
            }
            if (!queue.length) return null;
            let head = 0;
            while (head < queue.length) {
                const [r, c] = queue[head++];
                for (const [dr, dc] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
                    const nr = r + dr, nc = c + dc;
                    if (nr < 0 || nr >= gridRows || nc < 0 || nc >= gridCols) continue;
                    if (dist[nr][nc] !== -1) continue;
                    if (!PASSABLE.has(gridData[nr][nc].type)) continue;
                    if (!canStep(gridData, r, c, nr, nc)) continue;
                    dist[nr][nc] = dist[r][c] + 1;
                    queue.push([nr, nc]);
                }
            }
            return dist;
        }

        function styleFlowBtn() {
            const b = document.getElementById('flowBtn');
            if (!b) return;
            b.classList.toggle('bg-indigo-600', !!prefs.flowOn);
            b.classList.toggle('text-white', !!prefs.flowOn);
        }

        // 動線圖層：可達的通行格上距離色階（近綠遠紅）、走不到的通行格灰斜紋
        function updateFlowOverlay() {
            document.querySelectorAll('.flow-ov').forEach(n => n.remove());
            if (!prefs.flowOn) return;
            const dist = computeReachability();
            if (!dist) return; // 沒校門：不畫（toggle 時已提示）
            let maxD = 1;
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) maxD = Math.max(maxD, dist[r][c]);
            }
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    if (!PASSABLE.has(gridData[r][c].type)) continue;
                    const el = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
                    if (!el) continue;
                    const ov = document.createElement('div');
                    ov.className = 'flow-ov absolute inset-0 pointer-events-none z-[2]';
                    if (dist[r][c] >= 0) {
                        const hue = 120 - Math.round(120 * (dist[r][c] / maxD));
                        ov.style.background = `hsla(${hue}, 85%, 45%, 0.3)`;
                    } else {
                        ov.style.background = 'repeating-linear-gradient(45deg, rgba(107,114,128,0.45) 0 3px, transparent 3px 7px)';
                    }
                    el.appendChild(ov);
                }
            }
        }

        // 攻略規則：設施四周被建築完全包圍時，學生進不去、等於白蓋 → 整棟加紅框警告。
        // 同類型相連的格子視為同一棟；地圖上有校門時，出入口必須鄰接「從校門可達」的格子
        //（孤島上的設施也會被抓出來），沒有校門則退回「鄰接可通行地形」的判定。
        function updateAccessWarnings() {
            document.querySelectorAll('.tile.blocked').forEach(t => t.classList.remove('blocked'));
            let blockedCount = 0;
            const reach = computeReachability();
            const seen = Array(gridRows).fill(null).map(() => Array(gridCols).fill(false));
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    if (seen[r][c] || !isBuildingType(gridData[r][c].type)) continue;
                    const type = gridData[r][c].type;
                    const cells = [];
                    const stack = [[r, c]];
                    seen[r][c] = true;
                    let hasAccess = false;
                    while (stack.length) {
                        const [cr, cc] = stack.pop();
                        cells.push([cr, cc]);
                        [[1, 0], [-1, 0], [0, 1], [0, -1]].forEach(([dr, dc]) => {
                            const nr = cr + dr, nc = cc + dc;
                            if (nr < 0 || nr >= gridRows || nc < 0 || nc >= gridCols) return;
                            const nt = gridData[nr][nc].type;
                            if (nt === type && !seen[nr][nc]) { seen[nr][nc] = true; stack.push([nr, nc]); }
                            else if (PASSABLE.has(nt) && (!reach || reach[nr][nc] >= 0)) hasAccess = true;
                        });
                    }
                    if (!hasAccess) {
                        blockedCount++;
                        cells.forEach(([br, bc]) => {
                            const el = document.querySelector(`.tile[data-r="${br}"][data-c="${bc}"]`);
                            if (el) el.classList.add('blocked');
                        });
                    }
                }
            }
            lastBlockedCount = blockedCount;
        }

        // req 條件判定：每一項可以是單一 id 或「其中一種即可」的陣列
        function reqSatisfied(req, typeSet) {
            return req.every(g => (Array.isArray(g) ? g : [g]).some(t => typeSet.has(t)));
        }

        // 官方規則（攻略 Wiki）：三種條件建築同時「碰到」任一 4×4 視窗即成立景點，
        // 大建築只要一部分進入視窗就算。成立後，視窗內的條件建築格與其周圍一圈
        //（占地 4 格以上的大建築為兩圈）被指定為景點範圍。
        function checkSpots() {
            const coreGrid = Array(gridRows).fill(null).map(() => Array(gridCols).fill(null).map(() => new Set()));
            const areaGrid = Array(gridRows).fill(null).map(() => Array(gridCols).fill(null).map(() => new Set()));
            const activeIds = new Set();
            const nearMap = new Map(); // 只差一項的景點 id → 缺的設施名集合

            for (let wr = 0; wr <= gridRows - 4; wr++) {
                for (let wc = 0; wc <= gridCols - 4; wc++) {
                    const typesIn = new Set();
                    for (let dr = 0; dr < 4; dr++) {
                        for (let dc = 0; dc < 4; dc++) {
                            const t = gridData[wr + dr][wc + dc].type;
                            if (t !== 'empty') typesIn.add(t);
                            else if (isSlope(wr + dr, wc + dc)) typesIn.add('slope');
                        }
                    }
                    if (!typesIn.size) continue;

                    SPOTS.forEach(spot => {
                        const unmet = spot.req.filter(g => !(Array.isArray(g) ? g : [g]).some(t => typesIn.has(t)));
                        if (unmet.length === 1) {
                            // 只差一項 → 進統計面板的「差一項就成立」清單（記名稱與可點選的設施 id）
                            const g = Array.isArray(unmet[0]) ? unmet[0] : [unmet[0]];
                            const nm = g.map(t => items[t] ? items[t].name : t).join('/');
                            if (!nearMap.has(spot.id)) nearMap.set(spot.id, new Map());
                            nearMap.get(spot.id).set(nm, g[0]);
                            return;
                        }
                        if (unmet.length > 0) return;
                        activeIds.add(spot.id);
                        const reqTypes = spot.req.flat();
                        for (let dr = 0; dr < 4; dr++) {
                            for (let dc = 0; dc < 4; dc++) {
                                const nr = wr + dr, nc = wc + dc;
                                const rawT = gridData[nr][nc].type;
                                const t = rawT === 'empty' && isSlope(nr, nc) ? 'slope' : rawT;
                                if (!reqTypes.includes(t)) continue;
                                coreGrid[nr][nc].add(spot.id);
                                const it = items[t];
                                const ring = it && ((it.w || 1) * (it.h || 1) >= 4) ? 2 : 1;
                                for (let rr = -ring; rr <= ring; rr++) {
                                    for (let rc = -ring; rc <= ring; rc++) {
                                        const mr = nr + rr, mc = nc + rc;
                                        if (mr >= 0 && mr < gridRows && mc >= 0 && mc < gridCols) {
                                            areaGrid[mr][mc].add(spot.id);
                                        }
                                    }
                                }
                            }
                        }
                    });
                }
            }

            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    updateSpotIndicators(r, c, coreGrid[r][c], areaGrid[r][c]);
                }
            }
            lastSpotStats = { activeIds, nearMap };
            renderSpotStats(activeIds, nearMap);
            updateAccessWarnings();
            updateFlowOverlay();
            updateToolHint(currentTool, updateSuggestions());
            scheduleAutosave();
        }

        // ─── 佈局體檢報告 ───
        function buildReport() {
            const { activeIds, nearMap } = lastSpotStats;
            const act = SPOTS.filter(s => activeIds.has(s.id));
            // 屬性加成合計
            const totals = {};
            act.forEach(s => {
                for (const m of s.bonus.matchAll(/(\S+?)\+(\d+)/g)) {
                    totals[m[1]] = (totals[m[1]] || 0) + Number(m[2]);
                }
            });
            // 使用率與設施統計
            let builtCells = 0;
            const typeSet = new Set();
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const t = gridData[r][c].type;
                    if (t !== 'empty') { builtCells++; if (isBuildingType(t)) typeSet.add(t); }
                }
            }
            let html = `<div class="mb-2"><b class="text-gray-800">整體：</b>已使用 ${builtCells}／${gridRows * gridCols} 格，設施 ${typeSet.size} 種。</div>`;
            html += `<div class="mb-2"><b class="text-gray-800">成立景點：${act.length} 種</b>`;
            html += act.length ? '<br>' + act.map(s => `・${s.name}（${s.bonus}）`).join('<br>') : '（尚無）';
            html += '</div>';
            const tKeys = Object.keys(totals);
            if (tKeys.length) {
                html += `<div class="mb-2"><b class="text-gray-800">屬性加成合計：</b>${tKeys.map(k => `${k}+${totals[k]}`).join('、')}</div>`;
            }
            const nears = SPOTS.filter(s => !activeIds.has(s.id) && nearMap.has(s.id));
            if (nears.length) {
                html += '<div class="mb-2"><b class="text-gray-800">差一項就成立：</b><br>' +
                    nears.map(s => `・${s.name}：缺 ${[...nearMap.get(s.id).keys()].join(' 或 ')}`).join('<br>') + '</div>';
            }
            html += `<div class="mb-2"><b class="text-gray-800">動線警告：</b>${lastBlockedCount ? `⚠ 有 ${lastBlockedCount} 棟設施被完全包圍（紅框），學生無法進入` : '無，所有設施都有出入口 ✔'}</div>`;

        // 地圖上某設施的「棟數」：多格建築算棟別數，1×1 算格數
        function countBuilt(id) {
            const it = items[id];
            if (!it) return 0;
            const w = it.w || 1, h = it.h || 1;
            if (w * h > 1) {
                const bids = new Set();
                let cells = 0;
                for (let r = 0; r < gridRows; r++) {
                    for (let c = 0; c < gridCols; c++) {
                        if (gridData[r][c].type === id) { cells++; if (gridData[r][c].bid) bids.add(gridData[r][c].bid); }
                    }
                }
                return bids.size || Math.floor(cells / (w * h));
            }
            let n = 0;
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) if (gridData[r][c].type === id) n++;
            }
            return n;
        }

                html += stage.items.map(entry => {
                    const it = items[entry.id];

                    let needTxt = '';
                    let ready = true;
                    if (entry.needs) {
                        needTxt = Object.entries(entry.needs).map(([nid, cnt]) => {
                            const have = countBuilt(nid);
                            if (have < cnt) ready = false;
                            return `${items[nid].name}×${cnt}（地圖現有 ${have}）`;
                        }).join('、');
                    }
                    const icon = built > 0 ? '✅' : (entry.needs && !ready ? '🔒' : '⬜');
                    let line = `${icon} <b>${it.name}</b>`;
                    if (built > 0) line += `<span class="text-green-600">（已建 ${built}）</span>`;

                    if (entry.needs && !ready) line += `<br><span class="text-sky-600 ml-4">→ 先補齊：${needTxt}</span>`;
                    return `<div class="text-gray-600">${line}</div>`;

        // 把任意地圖資料畫到 canvas（axis=0 表示不畫座標軸；diffSet 內的格子加紅框）
        function drawMapToCanvas(ctx, grid, cell, axis, diffSet) {
            const W = axis * 2 + gridCols * cell, H = axis * 2 + gridRows * cell;
            ctx.fillStyle = '#f3f4f6';
            ctx.fillRect(0, 0, W, H);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (axis > 0) {
                ctx.fillStyle = '#4b5563';
                ctx.font = 'bold 10px sans-serif';
                for (let c = 0; c < gridCols; c++) {
                    const x = axis + c * cell + cell / 2;
                    ctx.fillText(25 - c, x, axis / 2);
                    ctx.fillText(25 - c, x, H - axis / 2);
                }
                for (let r = 0; r < gridRows; r++) {
                    const y = axis + r * cell + cell / 2;
                    ctx.fillText(r + 2, axis / 2, y);
                    ctx.fillText(r + 2, W - axis / 2, y);
                }
            }
            const labelFont = 'bold ' + Math.max(8, Math.floor(cell * 0.46)) + 'px sans-serif';
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const cellData = (grid[r] && grid[r][c]) || { type: 'empty', elevation: 1 };
                    const item = items[cellData.type] || items['empty'];
                    const x = axis + c * cell, y = axis + r * cell;
                    ctx.fillStyle = cellData.type === 'empty' ? '#bbf7d0' : item.color;
                    ctx.fillRect(x, y, cell - 1, cell - 1);
                    if (cellData.elevation >= 2) {
                        ctx.strokeStyle = cellData.elevation === 3 ? '#7c2d12' : '#b45309';
                        ctx.lineWidth = cell >= 20 ? 2 : 1;
                        ctx.strokeRect(x + 1.5, y + 1.5, cell - 4, cell - 4);
                    }
                    if (cell >= 10) {
                        if (cellData.type === 'empty' && isSlopeIn(grid, r, c)) {
                            ctx.fillStyle = '#92400e';
                            ctx.font = labelFont;
                            ctx.fillText('坡', x + cell / 2, y + cell / 2);
                        }
                        if (cellData.type !== 'empty') {
                            const corner = !(sameBlockIn(grid, r, c, r - 1, c) || sameBlockIn(grid, r, c, r, c - 1));
                            if (corner) {
                                ctx.fillStyle = item.textCol || 'black';
                                ctx.font = labelFont;
                                ctx.fillText(item.short, x + cell / 2, y + cell / 2);
                            }
                        }
                    }
                    if (diffSet && diffSet.has(r + ',' + c)) {
                        ctx.strokeStyle = '#dc2626';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x + 0.5, y + 0.5, cell - 2, cell - 2);
                    }
                }
            }
        }

        // 將目前地圖畫成 PNG 下載（俯視圖）
        function exportImage() {
            const cell = 26, axis = 20;
            const cv = document.createElement('canvas');
            cv.width = axis * 2 + gridCols * cell;
            cv.height = axis * 2 + gridRows * cell;
            drawMapToCanvas(cv.getContext('2d'), gridData, cell, axis);
            const a = document.createElement('a');
            const name = document.getElementById('saveName').value.trim() || 'pa2_map';
            a.download = `${name}.png`;
            a.href = cv.toDataURL('image/png');
            a.click();
            showSysMsg('已下載地圖圖片');
        }

                `<option value="${k}" ${k === sel ? 'selected' : ''}>${k === '__current__' ? '目前地圖' : k}</option>`).join('');
            document.getElementById('reportTitle').innerText = '🆚 存檔比較';
            document.getElementById('reportBody').innerHTML = `
                <div class="flex gap-2 mb-2 items-center text-xs">
                    <select id="cmpA" class="border border-gray-300 rounded p-1 flex-1">${optHtml('__current__')}</select>
                    <span class="text-gray-400 font-bold">vs</span>
                    <select id="cmpB" class="border border-gray-300 rounded p-1 flex-1">${optHtml(opts[1] || '__current__')}</select>
                </div>
                <div class="flex gap-3 justify-center mb-2 flex-wrap">
                    <canvas id="cmpCanvasA" class="border border-gray-200 rounded"></canvas>
                    <canvas id="cmpCanvasB" class="border border-gray-200 rounded"></canvas>
                </div>
                <div id="cmpSummary" class="text-xs text-gray-600"></div>`;
            const getGrid = k => {
                if (k === '__current__') return gridData;
                const e = maps[k];
                return Array.isArray(e) ? e : (e && e.data);
            };
            const render = () => {
                const gA = getGrid(document.getElementById('cmpA').value);
                const gB = getGrid(document.getElementById('cmpB').value);
                if (!gA || !gB) return;
                const diff = new Set();
                const delta = {};
                for (let r = 0; r < gridRows; r++) {
                    for (let c = 0; c < gridCols; c++) {
                        const a = (gA[r] && gA[r][c]) || { type: 'empty', elevation: 1 };
                        const b = (gB[r] && gB[r][c]) || { type: 'empty', elevation: 1 };
                        if (a.type !== b.type || (a.elevation || 1) !== (b.elevation || 1)) {
                            diff.add(r + ',' + c);
                            if (a.type !== b.type) {
                                if (a.type !== 'empty') delta[a.type] = (delta[a.type] || 0) - 1;
                                if (b.type !== 'empty') delta[b.type] = (delta[b.type] || 0) + 1;
                            }
                        }
                    }
                }
                const cell = 11;
                [[gA, 'cmpCanvasA'], [gB, 'cmpCanvasB']].forEach(([g, id]) => {
                    const cv = document.getElementById(id);
                    cv.width = gridCols * cell;
                    cv.height = gridRows * cell;

                    `<b>差異：${diff.size} 格</b>${diff.size ? '（紅框標示）' : '，兩張地圖相同'}` +
                    (deltaTxt ? `<br>左→右格數變化：${deltaTxt}` : '');
            };
            document.getElementById('cmpA').addEventListener('change', render);
            document.getElementById('cmpB').addEventListener('change', render);
            render();
            document.getElementById('reportModal').classList.remove('hidden');
        }

        function renderSpotStats(activeIds, nearMap) {
            const el = document.getElementById('spotStats');
            if (!el) return;
            const act = SPOTS.filter(s => activeIds.has(s.id));
            const nears = SPOTS.filter(s => !activeIds.has(s.id) && nearMap.has(s.id));
            const summary = document.getElementById('spotStatsSummary');
            if (summary) summary.innerText = `已成立 ${act.length}｜差一項 ${nears.length}`;
            let html = '';
            if (act.length) {
                // 精簡徽章排版：效果與教師改為滑過顯示
                html += '<div class="flex flex-wrap gap-1 mb-1">' + act.map(s =>
                    `<span class="inline-flex items-center gap-1 bg-white border border-yellow-200 rounded px-1.5 py-0.5 whitespace-nowrap" title="${s.bonus}${s.teacher ? '／可招募：' + s.teacher : ''}"><span class="w-2 h-2 rounded-full ${s.dotColor} inline-block"></span>${s.name}</span>`
                ).join('') + '</div>';
            } else {
                html += '<div class="text-gray-400">尚無成立的景點</div>';
            }
            if (nears.length) {
                html += '<div class="font-bold text-gray-500 mt-1.5 pt-1.5 border-t border-yellow-200">差一項就成立：</div>';
                html += '<div class="text-[10px] text-gray-400 mb-0.5">（點設施名稱，地圖會亮出可放置位置）</div>';
                html += nears.map(s => {
                    const chips = [...nearMap.get(s.id).entries()].map(([nm, id]) =>
                        `<button class="near-chip underline decoration-dotted text-sky-700 hover:text-sky-900 font-bold cursor-pointer" data-tool="${id}">${nm}</button>`
                    ).join(' 或 ');
                    return `<div class="text-gray-500">△ <b class="text-gray-700">${s.name}</b>：缺 ${chips}</div>`;
                }).join('');
            }
            el.innerHTML = html;
        }

        function getFootprint(id) {
            const it = items[id] || items['empty'];
            return { w: it.w || 1, h: it.h || 1 };
        }

        function canPlaceAllEmpty(r, c, w, h) {
            if (r + h > gridRows || c + w > gridCols) return false;
            for (let dr = 0; dr < h; dr++) {
                for (let dc = 0; dc < w; dc++) {
                    if (gridData[r + dr][c + dc].type !== 'empty') return false;
                }
            }
            return true;
        }

        function applyTool(r, c) {
            if (!window._paintedOnce) { window._paintedOnce = true; track('first_paint'); }
            // 清除模式點到多格建築 → 整棟拆除
            if (currentTool === 'empty' && gridData[r][c].bid !== undefined) {
                const bid = gridData[r][c].bid;
                for (let rr = 0; rr < gridRows; rr++) {
                    for (let cc = 0; cc < gridCols; cc++) {
                        if (gridData[rr][cc].bid === bid) {
                            gridData[rr][cc] = { type: 'empty', elevation: gridData[rr][cc].elevation };
                            updateTileVisuals(rr, cc);
                        }
                    }
                }
                checkSpots();
                updateCoordHint(r, c);
                return;
            }
            const fp = getFootprint(currentTool);
            if (r + fp.h > gridRows || c + fp.w > gridCols) {
                showSysMsg(`超出地圖範圍，${items[currentTool].name} 需要 ${fp.w}×${fp.h} 的空間`, true);
                return;
            }
            const bid = fp.w * fp.h > 1 ? ++blockIdCounter : undefined;
            for (let dr = 0; dr < fp.h; dr++) {
                for (let dc = 0; dc < fp.w; dc++) {
                    const cell = { type: currentTool, elevation: currentElevation };
                    if (bid) cell.bid = bid;
                    gridData[r + dr][c + dc] = cell;
                }
            }
            // 連同周圍一圈重繪：合併縫隙與鄰格的標籤顯示會受影響
            for (let dr = -1; dr <= fp.h; dr++) {
                for (let dc = -1; dc <= fp.w; dc++) {
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < gridRows && nc >= 0 && nc < gridCols) updateTileVisuals(nr, nc);
                }
            }
            checkSpots();
            updateCoordHint(r, c);

        // 系統預設地圖：遊戲共有 5 個城鎮。data 為 null 的表示還沒匯入地圖資料，
        // 會在下拉選單顯示「待匯入」；拿到該城鎮的存檔碼後，把 null 換成 `存檔碼` 即可。
        const PRESETS = {
            health: { name: '健康鎮', desc: '比例優良的標準地區', data: PRESET_DEFAULT_DATA },
            winter: { name: '冬郵小鎮', desc: '東京西邊的普通盆地', data: null },
            lake:   { name: '湖岸小鎮', desc: '被湖泊環繞的美麗地區', data: null },
            valley: { name: '溪谷小鎮', desc: '位於山區的峭壁地區', data: null },
            hill:   { name: '百靈山丘', desc: '位於市中心有許多有錢人', data: null }
        };

        function loadPreset(key) {
            const preset = PRESETS[key];
            if (!preset) return;
            if (!preset.data) { showSysMsg(`「${preset.name}」的地圖資料尚未匯入`, true); return; }
            try {
                const parsed = JSON.parse(preset.data);
                pushHistory();
                if (importGridData(parsed)) {
                    track('load_preset', { preset: key });
                    document.getElementById('saveName').value = preset.name;
                    showSysMsg(`已載入：${preset.name}`);
                } else {
                    showSysMsg('預設圖格式錯誤', true);
                }
            } catch (e) { showSysMsg('預設圖解析失敗', true); }
        }

        function seedProgressSave() {
            // 只在第一次開啟時植入，之後即使被刪除也不會再出現
            try {
                if (localStorage.getItem('pa2_seed_done_v1')) return;
                const maps = JSON.parse(localStorage.getItem('pa2_maps_v9')) || {};
                if (!maps['健康鎮進度']) {
                    maps['健康鎮進度'] = { data: JSON.parse(PROGRESS_SEED_DATA), ts: Date.now() };
                    localStorage.setItem('pa2_maps_v9', JSON.stringify(maps));
                }
                localStorage.setItem('pa2_seed_done_v1', '1');
            } catch (e) { console.error('初始化進度存檔失敗'); }
        }

        // 面板搜尋：依名稱/標籤過濾，整組沒結果的分類自動隱藏
        function filterPalette(q) {
            q = (q || '').trim().toLowerCase();
            document.querySelectorAll('.palette-item').forEach(el => {
                const id = el.id.replace('tool-', '');
                const item = items[id];
                const hit = !q || item.name.toLowerCase().includes(q) || id.includes(q) || (item.short && item.short.includes(q));
                el.style.display = hit ? '' : 'none';
            });
            ['palette-tools', 'palette-env', 'palette-fac', 'palette-spec', 'palette-sports', 'palette-farm'].forEach(cid => {
                const cont = document.getElementById(cid);
                if (!cont) return;
                const any = [...cont.children].some(ch => ch.style.display !== 'none');
                cont.parentElement.style.display = any ? '' : 'none';
            });
        }

        // 最近使用列（存進偏好，跨次記憶）
        function renderRecent() {
            const row = document.getElementById('recentRow');
            if (!row) return;
            const list = (prefs.recent || []).filter(id => items[id] && !items[id].hidden);
            row.innerHTML = list.length
                ? '<span class="text-[10px] text-gray-400 self-center">最近：</span>' + list.map(id =>
                    `<button class="recent-chip w-7 h-7 rounded border border-gray-200 shadow-sm text-[14px] flex items-center justify-center hover:scale-110 transition" style="background:${items[id].color}" title="${items[id].name}" data-tool="${id}">${ITEM_ICONS[id] || items[id].short}</button>`
                ).join('')
                : '';
        }

        function renderPresetOptions() {
            const select = document.getElementById('presetSelect');
            Object.entries(PRESETS).forEach(([key, p]) => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.innerText = p.data ? p.name : `${p.name}（待匯入）`;
                opt.title = p.desc || '';
                if (!p.data) opt.disabled = true;
                select.appendChild(opt);
            });
        }

        function loadSavedMapsList() {
            const select = document.getElementById('loadLocalSelect');
            select.innerHTML = '<option value="">-- 讀取存檔 --</option>';
            try {
                const maps = JSON.parse(localStorage.getItem('pa2_maps_v9')) || {};
                Object.keys(maps).forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    const ts = maps[name] && !Array.isArray(maps[name]) && maps[name].ts;
                    if (ts) {
                        const d = new Date(ts);
                        opt.innerText = `${name}（${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}）`;
                    } else {
                        opt.innerText = name;
                    }
                    select.appendChild(opt);
                });
            } catch (e) { console.error("讀取清單失敗"); }
        }

        // 為預設圖/舊存檔中的多格建築自動標記棟別（貪婪：由左上往右下找完整 w×h 區塊）
        function assignBlockIds() {
            let maxBid = 0;
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const b = gridData[r][c].bid;
                    if (b && b > maxBid) maxBid = b;
                }
            }
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const t = gridData[r][c].type;
                    const it = items[t];
                    if (!it) continue;
                    const w = it.w || 1, h = it.h || 1;
                    if (w * h <= 1 || gridData[r][c].bid) continue;
                    if (r + h > gridRows || c + w > gridCols) continue;
                    let ok = true;
                    for (let dr = 0; dr < h && ok; dr++) {
                        for (let dc = 0; dc < w && ok; dc++) {
                            const cell = gridData[r + dr][c + dc];
                            if (cell.type !== t || cell.bid) ok = false;
                        }
                    }
                    if (!ok) continue;
                    const bid = ++maxBid;
                    for (let dr = 0; dr < h; dr++) {
                        for (let dc = 0; dc < w; dc++) gridData[r + dr][c + dc].bid = bid;
                    }
                }
            }
            blockIdCounter = maxBid;
        }

        function importGridData(parsed) {
            if (!Array.isArray(parsed)) return false;

            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const val = parsed[r] && parsed[r][c] ? parsed[r][c] : { type: 'empty', elevation: 1 };
                    const cellValue = typeof val === 'object' ? (val.type || 'empty') : (val || 'empty');
                    const cellElev = typeof val === 'object' ? (val.elevation || 1) : 1;

                    gridData[r][c] = { type: cellValue, elevation: cellElev };
                    if (typeof val === 'object' && val.bid) gridData[r][c].bid = val.bid;
                }
            }
            assignBlockIds();
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) updateTileVisuals(r, c);
            }
            checkSpots();
            return true;
        }

            document.getElementById('renameLocalBtn').addEventListener('click', () => {
                const name = document.getElementById('loadLocalSelect').value;
                if (!name) { showSysMsg('請先選擇要改名的存檔！', true); return; }
                const input = prompt(`將「${name}」改名為：`, name);
                const newName = input && input.trim();
                if (!newName || newName === name) return;
                try {
                    const maps = JSON.parse(localStorage.getItem('pa2_maps_v9')) || {};

            document.getElementById('diamondBtn').addEventListener('click', () => {

                track('export_code');
                const dataStr = JSON.stringify(gridData);
                navigator.clipboard.writeText(dataStr).then(() => {
                    showSysMsg('存檔碼已複製到剪貼簿！');
                }).catch(() => {
                    const io = document.getElementById('ioData');
                    io.value = dataStr;
                    io.classList.remove('hidden');
                    io.select();
                    document.execCommand('copy');
                    io.classList.add('hidden');
                    showSysMsg('存檔碼已複製！');
                });
            });

            document.getElementById('loadCodeBtn').addEventListener('click', () => {
                navigator.clipboard.readText().then(text => {
                    try {
                        const parsed = JSON.parse(text);
                        if (Array.isArray(parsed)) pushHistory();
                        if (importGridData(parsed)) { track('import_code'); showSysMsg('代碼匯入成功！'); }
                        else showSysMsg('格式錯誤', true);
                    } catch (e) { showSysMsg('無法解析剪貼簿內容', true); }
                }).catch(() => {
                     showSysMsg('無法存取剪貼簿，請允許權限。', true);
                });
            });
        }
    </script>
</body>
</html>
