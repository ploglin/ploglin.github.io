<body>
    <main class="container">
        <h1 style="font-size:clamp(22px,3.5vw,30px);font-weight:900;margin:14px 0 2px">機場物語 佈局模擬器</h1>
        <p style="color:var(--ink-soft);margin:6px 0 14px">擺放店鋪即時判定成立哪些<strong>設施相性 combo（綠心配對）</strong>——兩個相性良好的設施相鄰即成立，右側提示<strong>差一步就成立</strong>的組合。資料取自本站
            <a href="../db/combos/">相性 combo 資料庫</a>；玩法見 <a href="../">機場物語攻略</a>。<br>
            <small style="color:var(--muted)">※ 成立採「兩設施相鄰（1 格內）」判定為航廈規劃輔助，實際以遊戲放置時的綠心提示為準；同種設施（按摩椅／電腦區／午睡室）相鄰也成對。</small></p>
        <div id="simApp"></div>
    </main>

    <script src="../db/data.js"></script>
    <script src="../../../assets/sim.js"></script>
    <script>
        SimEngine.mount({
            category: 'combos', nameCol: 0, reqCol: 1, reqSep: '・',
            bonuses: [{ i: 2, label: '人氣', sum: false }],
            rule: { type: 'radius', dist: 1 },
            ruleText: '相鄰即成立(1 格內)'
        });
    </script>
    <script src="../../../assets/shell.js"></script>
    <script>Shell.mount({ page: 'sim', game: { id: 'airport', type: 'simulator' }, breadcrumb: [{ t: '機場物語', href: '../' }, { t: '佈局模擬器' }] });</script>
