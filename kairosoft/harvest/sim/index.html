<body>
    <main class="container">
        <h1 style="font-size:clamp(22px,3.5vw,30px);font-weight:900;margin:14px 0 2px">大農場物語 佈局模擬器</h1>
        <p style="color:var(--ink-soft);margin:6px 0 14px">擺放設施即時判定成立哪些 <strong>combo</strong>（兩個指定設施相鄰成組），右側提示<strong>差一步就成立</strong>的組合。含環境樹自我 combo，可規劃奪冠圍田陣型。資料取自本站
            <a href="../db/combos/">設施 combo 資料庫</a>；玩法見 <a href="../">大農場物語攻略</a>。<br>
            <small style="color:var(--muted)">※ 成立採「成員彼此相鄰（1 格內）」判定為規劃輔助，實際以遊戲為準。</small></p>
        <div id="simApp"></div>
    </main>

    <script src="../db/data.js"></script>
    <script src="../../../assets/sim.js?v=2"></script>
    <script>
        SimEngine.mount({
            category: 'combos', nameCol: 0, reqCol: 1, reqSep: '・',
            bonuses: [{ i: 2, label: '效果', sum: false }],
            rule: { type: 'radius', dist: 1 }, ruleText: '相鄰即成立（1 格內）'
        });
    </script>
    <script src="../../../assets/shell.js?v=2"></script>
    <script>Shell.mount({ page: 'sim', game: { id: 'harvest', type: 'simulator' }, breadcrumb: [{ t: '大農場物語', href: '../' }, { t: '佈局模擬器' }] });</script>
