<body>
    <noscript>開羅攻略站：Kairosoft 開羅遊戲的繁體中文攻略與模擬器。啟用 JavaScript 以瀏覽完整遊戲清單。</noscript>

    <section class="hero">
        <div class="container">
            <span class="pill">繁體中文 · 非官方粉絲攻略</span>
            <h1>開羅遊戲攻略站</h1>
            <p>把 Kairosoft（カイロソフト）各作的攻略、combo 組合表與互動模擬器，一站整理成好查好用的繁體中文資源。</p>
        </div>
    </section>

    <main class="container">
        <!-- 精選 -->
        <section class="section" id="featured">
            <div class="section-head">
                <h2>🌟 精選攻略</h2>
            </div>
            <div class="card-grid" id="featuredGrid"></div>
        </section>


        <!-- 模擬器 -->
        <section class="section" id="simulators">
            <div class="section-head">
                <h2>🧩 互動模擬器</h2>
            </div>
            <div class="card-grid" id="simGrid"></div>
        </section>

        <!-- 攻略/資料庫 -->
        <section class="section" id="guides">
            <div class="section-head">
                <h2>📖 攻略與資料表</h2>
            </div>
            <div class="card-grid" id="guideGrid"></div>
        </section>

        <!-- 全部（含即將推出） -->
        <section class="section" id="all">
            <div class="section-head">
                <h2>🗂️ 全部遊戲</h2>
                <span class="more" style="color:var(--muted)">持續增加中</span>
            </div>
            <div class="card-grid" id="allGrid"></div>
        </section>
    </main>

    <script src="assets/games-index.js"></script>
    <script>
        (function () {
            var GAMES = window.GAMES || [];

            // hrefOverride：模擬器區用來直連 /sim/；badge：額外標籤（如「模擬器」）
            function card(g, hrefOverride, badge) {
                var live = g.status === 'live';
                var tags = (g.tags || []).map(function (t) {
                    return '<span class="tag ' + t[0] + '">' + t[1] + '</span>';
                }).join('');
                if (badge) tags = '<span class="tag sim">' + badge + '</span>' + tags;
                if (!live) tags += '<span class="tag soon">即將推出</span>';

                var inner =
                    '<div class="cover" style="--accent-bg:' + (g.accent || '') + '">' + (g.emoji || '🎮') + '</div>' +
                    '<div class="body">' +
                    '<div class="title">' + g.title + '</div>' +
                    '<div class="jp">' + (g.jp || '') + (g.en ? '　·　' + g.en : '') + '</div>' +
                    '<div class="desc">' + (g.desc || '') + '</div>' +
                    '<div class="tags">' + tags + '</div>' +
                    '</div>';

                if (live) {
                    var a = document.createElement('a');
                    a.className = 'game-card';
                    a.href = hrefOverride || g.slug;
                    a.innerHTML = inner;
                    a.addEventListener('click', function () {
                        if (window.Shell) Shell.track('open_game', { target_game: g.id, game_type_target: hrefOverride ? 'simulator' : g.type });
                    });
                    return a;
                }
                var d = document.createElement('div');
                d.className = 'game-card soon';
                d.innerHTML = inner;
                return d;
            }

            function fill(id, list, hrefFn, badge) {
                var el = document.getElementById(id);
                if (!el) return;
                if (!list.length) { el.parentNode.style.display = 'none'; return; }
                list.forEach(function (g) { el.appendChild(card(g, hrefFn ? hrefFn(g) : null, badge)); });
            }

            fill('featuredGrid', GAMES.filter(function (g) { return g.featured; }));
            // 模擬器區：凡有模擬器(sim 或 type=simulator)者，卡片直接連到 /sim/
            fill('simGrid', GAMES.filter(function (g) { return g.sim || g.type === 'simulator'; }),
                function (g) { return g.slug + 'sim/'; }, '🧩 佈局模擬器');
            fill('guideGrid', GAMES.filter(function (g) { return g.type === 'guide' || g.type === 'database'; }));
            fill('allGrid', GAMES);
        })();
    </script>
    <script src="assets/shell.js"></script>
    <script>Shell.mount({ page: 'home' });</script>
</body>
