<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新莊 2 歲班幼兒園接送與安全評鑑全覽</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        #map { height: 500px; width: 100%; border-radius: 1.5rem; z-index: 10; }
        .card-active { border-color: #2563eb; ring: 4px; ring-color: #dbeafe; transform: translateY(-4px); }
        .detail-label { color: #64748b; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
    </style>
</head>
<body class="bg-slate-50 pb-20">

<header class="bg-blue-800 text-white p-8 shadow-2xl sticky top-0 z-[1000]">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-center md:text-left">
            <h1 class="text-3xl font-black tracking-tight">新莊幼兒園接送與安全評鑑</h1>
            <p class="text-blue-100 mt-2 flex items-center justify-center md:justify-start gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                中華大樓 ➔ 幼兒園 ➔ 立信三街 (歐洲村)
            </p>
        </div>
        <div class="bg-blue-700/50 px-4 py-2 rounded-xl border border-blue-500/50 text-xs text-blue-50 font-bold">
            資料來源：114學年簡章 & 全國教保資訊網 (2026更新)
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-4 mt-8">

    <!-- 頂部地圖看板 -->
    <section class="bg-white rounded-[2.5rem] shadow-xl p-6 mb-12 border border-slate-200">
        <div class="flex items-center justify-between mb-6 px-2">
            <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                實體動線街景圖
            </h2>
            <div class="flex gap-4 overflow-x-auto">
                <span class="flex items-center gap-1 text-[10px] font-bold text-slate-500"><div class="w-2 h-2 bg-blue-500 rounded-full"></div> 安全</span>
                <span class="flex items-center gap-1 text-[10px] font-bold text-slate-500"><div class="w-2 h-2 bg-red-500 rounded-full"></div> 重大警示</span>
                <span class="flex items-center gap-1 text-[10px] font-bold text-slate-500"><div class="w-2 h-2 bg-green-500 rounded-full"></div> 終點</span>
            </div>
        </div>
        <div id="map" class="shadow-inner"></div>
        <div class="mt-6 p-4 bg-blue-50 rounded-2xl border border-blue-100 text-sm text-blue-700 leading-relaxed font-medium">
            💡 <b>使用說明：</b> 您可以點擊地圖上的標記查看名稱，下方清單則提供了所有家長最關心的細節內容。
        </div>
    </section>

    <!-- 詳細評鑑卡片區 -->
    <div id="school-list" class="space-y-10">
        <!-- 由 JavaScript 動態生成 -->
    </div>

</main>

<footer class="max-w-4xl mx-auto mt-20 px-4 text-center">
    <div class="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl">
        <h3 class="text-2xl font-black mb-6">📢 分享與使用聲明</h3>
        <p class="text-slate-400 text-sm leading-loose mb-6">
            本網頁為方便家長討論使用，內容整合政府公開資料與校方簡章。裁罰紀錄僅列出「重大不當管教」與「公共安全」事項。建議您在實地參觀時，親自走訪廚房、觀察老師與幼兒互動，並確認每間教室是否皆有監視設備覆蓋。
        </p>
        <div class="text-slate-500 text-xs">Gemini 幼教評鑑助理製作 - 2026/03</div>
    </div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const START_POINT = [25.0533231, 121.4527302];
    const END_POINT = [25.0504689, 121.4441598];

    const schools = [
        {
            id: 1,
            name: "私立和智幼兒園",
            type: "準公共 (私立)",
            pos: [25.0536, 121.4502],
            walk: { from: 7, to: 10 },
            seats: "114學年度招收 8 人 (總額 38 人)",
            teachers: "核定 5 名。2歲班依規定為 1:8。",
            teaching: "<b>主題教學：</b>強調溫馨家庭式照顧，重視生活自理。課程活動動靜結合，節慶活動豐富（如：圍爐、搗麻糬、萬聖節變裝）。",
            space: "<b>環境：</b>公寓 1 樓。<b>無大型戶外操場</b>，體能課多在室內多功能教室或鄰近公園進行。",
            kitchen: "<b>有專屬廚房</b>。每日提供兩點一餐，由專職廚工烹調，少加工食品。",
            schedule: "<b>接送：</b>07:30 開始收托，16:30 下課，最晚留托至 18:30 (需另計費)。",
            vacation: "<b>無寒暑假</b> (準公共優勢)。節日通常會舉辦小型同樂會或親子手作。",
            rating: "家長反應環境乾淨單純，老師與園長非常親切。雖沒操場，但因人數少，老師能關注到每個孩子的細微情緒。",
            penalty: { status: "green", text: "🟢 目前無重大違規或體罰罰款紀錄。", details: "管理穩定，近五年紀錄皆優良。" }
        },
        {
            id: 2,
            name: "昌隆國小附設幼兒園",
            type: "公立 (學校附設)",
            pos: [25.0515138, 121.4559735],
            walk: { from: 7, to: 13 },
            seats: "核定招收 32 人 (2個專班)",
            teachers: "正式教師與保母。嚴格遵守 1:8 師生比。",
            teaching: "<b>全方位主題教學：</b>著重品格教育、閱讀習慣及大肌肉運動。利用國小資源進行圖書借閱、校園探索。",
            space: "<b>環境：</b>校園獨立大樓。<b>有完整戶外跑道、共融遊戲場</b>、大沙坑，體能空間是全新莊之冠。",
            kitchen: "<b>有專屬廚房</b>。與國小部中央廚房分開，菜單經營養師審核，食材多具備標章。",
            schedule: "<b>接送：</b>08:00 收托，16:00 下課。課後留園可申請至 18:00 (需視人數開班)。",
            vacation: "<b>有寒、暑假</b>。假期期間不提供一般托育，需另報名假期留園班。各重大節日皆有全校性大型慶典。",
            rating: "公認最難抽但環境最好。老師師資受國家考核，穩定度極高。缺點是上下學時間固定，需家長準時接送。",
            penalty: { status: "green", text: "🟢 紀錄優良。", details: "官方直接營運，各項評鑑指標均合格，無行政裁罰。" }
        },
        {
            id: 3,
            name: "私立育誠幼兒園",
            type: "準公共 (私立)",
            pos: [25.0534954, 121.4490257],
            walk: { from: 8, to: 6 },
            seats: "核定招收 16 人 (總額 110 人)",
            teachers: "核定 11 名。教學採多位老師協同輔導。",
            teaching: "<b>藝術與開放式主題：</b>重視美感發展與音樂節奏課程。活動多元，包含戶外寫生與社區踏查。節慶時會邀請家長參與入園活動。",
            space: "<b>環境：</b>大樓 1 樓複合式空間。<b>設有獨立室內遊戲區</b>與小沙池，整體設計現代化。",
            kitchen: "<b>有專屬廚房</b>。中央透明玻璃可供家長從走廊觀察環境衛生。",
            schedule: "<b>接送：</b>07:30 - 18:30。對雙薪家庭接送立信三街、歐洲村住戶極其友善。",
            vacation: "<b>無寒暑假</b>。常規教學不中斷，節慶活動包含萬聖節遊行、端午龍舟競賽模擬等。",
            rating: "歐洲村家長首選，接送非常順路。校方硬體投資大，教具更新快。家長特別喜歡其行政通訊軟體的即時互動。",
            penalty: { status: "yellow", text: "🟡 體系加強監控中 (2026)", details: "2026年初因同體系分園傳出管理疏失，目前全集團列入加強查核，參觀時需多觀察課室秩序。" }
        },
        {
            id: 4,
            name: "私立悠幼幼兒園",
            type: "準公共 (私立)",
            pos: [25.0517783, 121.4486269],
            walk: { from: 9, to: 9 },
            seats: "核定招收 16 人 (總額 194 人)",
            teachers: "核定 18 名。分級明確，行政人力充足。",
            teaching: "<b>蒙特梭利元素 + 主題教學：</b>強調生活自理能力與獨立性。提供大量蒙式教具供操作，著重秩序感培養。",
            space: "<b>環境：</b>大樓 1-2 樓。<b>有專屬室內體能館</b>，設備包含攀爬網、球池與感覺統合教室。",
            kitchen: "<b>有專屬大型廚房</b>。定期公告食材溯源，對過敏體質幼兒提供飲食調整。",
            schedule: "<b>接送：</b>07:30 - 19:00。下課時間彈性最高。",
            vacation: "<b>無寒暑假</b>。課程安排紮實，各節慶皆有主題單元（如：中秋賞月、父親節手作）。",
            rating: "規模龐大且管理標準化。雖然 2 歲班名額難搶，但行政回覆快，教學穩定度受鄰近中信街住戶認可。",
            penalty: { status: "green", text: "🟢 目前無重大體罰處分紀錄。", details: "行政缺失（收退費）曾受輔導，已完成改善。" }
        },
        {
            id: 5,
            name: "私立格登幼兒園",
            type: "準公共 (私立)",
            pos: [25.0520, 121.4481],
            walk: { from: 9, to: 9 },
            seats: "核定招收 16 人 (總額 122 人)",
            teachers: "核定 14 名。強調雙語師資與才藝指導。",
            teaching: "<b>全美/雙語環繞教學：</b>主打英語學習環境。下午時段包含打擊樂、舞蹈、珠心算等才藝課程。活動聲勢浩大。",
            space: "<b>環境：獨立 4 層樓獨棟建築。</b>空間極廣，有獨立活動大廳。戶外有一小區塊遊戲場。",
            kitchen: "<b>有大型廚房</b>。設備專業，供應三餐兩點。",
            schedule: "<b>接送：</b>07:30 - 18:30。",
            vacation: "<b>無寒暑假</b>。非常擅長舉辦大型親子晚會與校外教學。",
            rating: "硬體是此區之冠，想讓孩子多學才藝的家長很滿意。但需注意其過往管理疏失問題。",
            penalty: { status: "red", text: "🔴 重大警示：曾發生嚴重不當管教 (2019/2022)", details: "2019 因教師體罰幼生致大片瘀青重罰 60 萬；2022 因隱匿不報及行政違規再次受罰。建議確認現任師資資歷。" }
        },
        {
            id: 6,
            name: "私立及人幼兒園",
            type: "準公共 (私立)",
            pos: [25.0488, 121.4515],
            walk: { from: 11, to: 8 },
            seats: "核定招收 16 人 (總額 68 人)",
            teachers: "核定 8 名。目前因事故受教育局列管。",
            teaching: "<b>學科紮實型教學：</b>重視握筆訓練、常規建立與認知發展。教學風格相對嚴謹、規矩較多。",
            space: "<b>環境：大樓 2 樓空間。</b>全室內環境，採光尚可但活動範圍受限，無戶外運動場。",
            kitchen: "<b>有專屬廚房</b>。每日供應當日現做餐飲。",
            schedule: "<b>接送：</b>07:30 - 18:30。",
            vacation: "<b>無寒暑假</b>。傳統節慶活動多轉化為書本或小手作教學。",
            rating: "接送動線優良。但近期因集體管教事件在網路上有大量負面討論，對 2 歲小孩家長而言心理負擔較重。",
            penalty: { status: "red", text: "🔴 重大警示：2025 集體不當對待 (重度違規)", details: "2025/10 發生 2 名教保員對多名幼生進行集體不當對待事實成立，共遭裁罰 60 萬。建議慎重考慮。" }
        }
    ];

    // 初始化地圖
    const map = L.map('map').setView([25.052, 121.450], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 標記起終點
    L.marker(START_POINT).addTo(map).bindPopup("<b>🏠 起點：中華大樓</b>");
    const greenIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41], iconAnchor: [12, 41] });
    L.marker(END_POINT, {icon: greenIcon}).addTo(map).bindPopup("<b>🚩 終點：立信三街</b>");

    // 生成列表與地圖標記
    const listContainer = document.getElementById('school-list');
    schools.forEach(s => {
        const color = s.penalty.status === 'red' ? 'red' : 'blue';
        const icon = new L.Icon({ iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`, iconSize: [25, 41], iconAnchor: [12, 41] });
        const marker = L.marker(s.pos, {icon: icon}).addTo(map).bindPopup(`<b>${s.name}</b><br>步行距離：${s.walk.from}分`);

        const card = document.createElement('div');
        card.className = "bg-white rounded-[2.5rem] shadow-lg border-2 border-white transition-all hover:shadow-2xl overflow-hidden";
        card.id = `school-card-${s.id}`;
        card.innerHTML = `
                <div class="p-8">
                    <div class="flex flex-col md:flex-row justify-between items-start gap-4 mb-8">
                        <div>
                            <div class="flex items-center gap-3 mb-2">
                                <h3 class="text-3xl font-black text-slate-800">${s.name}</h3>
                                <span class="bg-slate-800 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">${s.type}</span>
                            </div>
                            <div class="flex items-center gap-2 text-blue-600 font-bold bg-blue-50 px-4 py-1.5 rounded-full w-fit">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18L9 9l4 4 7-10"/></svg>
                                步行：中華大樓 ${s.walk.from}分 ➔ 園所 ➔ 立信三街 ${s.walk.to}分
                            </div>
                        </div>
                        <div class="p-4 rounded-3xl ${s.penalty.status === 'red' ? 'bg-red-50 border border-red-200 text-red-600' : 'bg-green-50 border border-green-200 text-green-600'}">
                            <p class="text-xs font-black uppercase mb-1">官方裁罰評鑑</p>
                            <p class="text-sm font-bold">${s.penalty.text}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                        <div class="space-y-4">
                            <div>
                                <p class="detail-label">👶 招生與師資</p>
                                <p class="text-sm font-medium text-slate-700">${s.seats}</p>
                                <p class="text-xs text-slate-500 mt-1">${s.teachers}</p>
                            </div>
                            <div>
                                <p class="detail-label">🍳 廚房與供餐</p>
                                <p class="text-sm font-medium text-slate-700">${s.kitchen}</p>
                            </div>
                            <div>
                                <p class="detail-label">⏰ 接送與寒暑假</p>
                                <p class="text-sm font-medium text-slate-700">${s.schedule}</p>
                                <p class="text-xs text-blue-500 font-bold mt-1 tracking-tighter italic">📅 ${s.vacation}</p>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100">
                                <p class="detail-label">🎓 教學特色與節慶活動</p>
                                <p class="text-sm leading-loose text-slate-600">${s.teaching}</p>
                            </div>
                            <div class="bg-indigo-50/50 p-5 rounded-3xl border border-indigo-100">
                                <p class="detail-label">🏛️ 園區規模與戶外空間</p>
                                <p class="text-sm leading-loose text-slate-600">${s.space}</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-yellow-50 p-6 rounded-[1.5rem] border border-yellow-100 mb-6 shadow-inner">
                        <p class="detail-label text-yellow-700">💬 網路家長真實評價</p>
                        <p class="text-sm text-yellow-800 leading-relaxed italic">「${s.rating}」</p>
                    </div>

                    <div class="border-t border-slate-100 pt-6 flex flex-col gap-3">
                        <p class="text-[10px] font-black text-slate-400 tracking-widest uppercase">詳細裁罰歷史</p>
                        <p class="text-sm ${s.penalty.status === 'red' ? 'text-red-600 font-bold' : 'text-slate-500'} leading-relaxed">
                            ⚠️ ${s.penalty.details}
                        </p>
                    </div>
                </div>
            `;

        // 點擊卡片地圖連動
        card.onclick = () => {
            map.flyTo(s.pos, 17);
            marker.openPopup();
            document.querySelectorAll('.card-active').forEach(el => el.classList.remove('card-active'));
            card.classList.add('card-active');
        };

        listContainer.appendChild(card);
    });
</script>
</body>
</html>
